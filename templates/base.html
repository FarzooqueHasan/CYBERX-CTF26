<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CyberX Induction CTF{% endblock %}</title>
    <meta name="description" content="CyberX Club Induction CTF — 2026 Selection Assessment">
    <link rel="stylesheet" href="/static/css/style.css">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="/" class="nav-logo">CyberX</a>
            <div class="nav-right">
                {% if team %}
                    <span class="nav-user">{{ team.team_name }}</span>
                    <form action="/logout" method="post" style="display:inline;">
                        <button type="submit" class="nav-action">Sign out</button>
                    </form>
                {% else %}
                    <a href="/register" class="nav-action">Sign in</a>
                {% endif %}
            </div>
        </nav>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script src="/static/js/main.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
